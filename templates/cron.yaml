{{- $labels := .Values.labels -}}
{{- $defaults := .Values.cronJobDefaults -}}
{{- $serviceAccount := .Values.serviceAccount -}}
{{- $secrets := .Values.secrets }}
{{- range $job := .Values.jobs }}
{{- $image_name := $.Values.image.repository }}
{{- $image_version := $.Values.image.version }}

{{- $env := $job.env }}
{{- if $job.useDefaultEnvs }}
  {{- $env = $defaults.env }}
{{- end }}

{{- $envFrom := $job.envFrom }}
{{- if $job.useDefaultEnvsFrom }}
  {{- $envFrom = $defaults.envFrom }}
{{- end }}

{{- $resources := $job.resources | default $defaults.resources}}
{{- if $job.useDefaultResources }}
  {{- $resources = $defaults.resources }}
{{- end }}

{{- $volumes := $job.volumes }}
{{- if $job.useDefaultVolumes }}
  {{- $volumes = $defaults.volumes }}
{{- end }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $job.name }}
  labels:
    {{- include "common.labels" $labels | nindent 4 }}
spec:
  concurrencyPolicy: {{ $job.concurrencyPolicy  | default $defaults.concurrencyPolicy }}
  failedJobsHistoryLimit: {{ $job.failedJobsHistoryLimit }}
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
    {{- if $job.backoffLimit }}
      backoffLimit: {{ $job.backoffLimit }}
    {{- end }}
    {{- if $job.activeDeadlineSeconds }}
      activeDeadlineSeconds: {{ $job.activeDeadlineSeconds }}
    {{- end }}
      template:
        metadata:
          labels:
            {{- include "common.labels" $labels | nindent  12 }}
            cron: {{ $job.name }}
        spec:
          {{- if $job.nodeSelector }}
          {{- with $job.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- else }}
          nodeSelector:
            node-role.kubernetes.io: nodes
          {{- end }}        
          imagePullSecrets:
          - name: {{ $job.image.pullSecret | default $.Values.image.pullSecret }}
          {{- if $job.dnsConfig }} 
          dnsConfig:
          {{- toYaml $job.dnsConfig | nindent 12 }}
          {{- end }}
        {{- if $job.useServiceAccount }}
          serviceAccountName: {{ $serviceAccount.name | default $defaults.serviceAccount.name }}
        {{- end }}
        {{- if hasKey $job "securityContext" }}
          {{- if $job.securityContext.runAsUser }}
          securityContext:
            runAsUser: {{ $job.securityContext.runAsUser }}
            {{- if $job.securityContext.runAsGroup }}
            runAsGroup: {{ $job.securityContext.runAsGroup }}
            {{- end }}
            {{- if $job.securityContext.fsGroup }}
            fsGroup: {{ $job.securityContext.fsGroup }}
            {{- end }}
          {{- end }}
        {{- end }}
          containers:
          - image: "{{ $image_name }}:{{ $image_version }}"
            imagePullPolicy: {{ $job.image.pullPolicy | default "IfNotPresent" }}
            env:
{{- include "common.envVars" (dict "Env" $env) | nindent 8 }}
{{- include "common.secretEnvVars" (dict "Secrets" $secrets) | nindent 8 }}
{{- include "common.envVarsFrom" (dict "EnvFrom" $envFrom) | nindent 8 }}
            {{- if $job.command }}
            command: {{ $job.command }}
            {{- end }}
            {{- with $job.args }}
            args:
              {{- toYaml . | nindent 14 }}
            {{- end }}

            {{- with $resources }}
            resources:
              {{- toYaml . | nindent 14 }}
            {{- end }}


            {{- if $volumes }}
            volumeMounts:
              {{- range $volume := $volumes }}
              - name: {{ $volume.name }}
                mountPath: {{ $volume.mountPath }}
              {{- end }}
            {{- end }}

          {{- with $job.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $job.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{ if $job.activeDeadlineSeconds }}
          activeDeadlineSeconds: {{ $job.activeDeadlineSeconds }}
          {{ end }}
          restartPolicy: {{ $job.restartPolicy | default $defaults.restartPolicy }}


          {{- if $volumes }}
          volumes:
            {{- range $volume := $volumes }}
            - name: {{ $volume.name }}
              persistentVolumeClaim:
                claimName: {{ $volume.persistentVolumeClaim.claimName }}
            {{- end }}
          {{- end }}

  schedule: {{ $job.schedule | quote }}
  successfulJobsHistoryLimit: {{ $job.successfulJobsHistoryLimit | default $defaults.successfulJobsHistoryLimit }}
  {{- if $job.suspend }} 
  suspend: {{ $job.suspend }} 
  {{- end }}
{{- end }}